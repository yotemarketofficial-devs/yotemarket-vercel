<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C2BD4" />
    <title>YoteMarket — Shop Local. Delivered Fast.</title>
    <meta
      name="description"
      content="YoteMarket is Kenya's virtual mall — shop 200+ local stores, negotiate over WhatsApp, pay with M-Pesa, and collect at your nearest hub. Sell, deliver, and earn on one platform."

    <meta property="og:type" content="website" />

    <meta property="og:title" content="YoteMarket — Shop Local. Delivered Fast." />

      property="og:description"
      content="Kenya's virtual mall — shop local stores, pay with M-Pesa, and collect at your nearest hub."

    <meta property="og:url" content="https://yotemarket.com/" />

      name="twitter:description"
      content="Kenya's virtual mall — shop local stores, pay with M-Pesa, and collect at your nearest hub."

    <link rel="icon" href="/assets/favicon.png" />
